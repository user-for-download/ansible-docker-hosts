---
docker_edition: "ce"
docker_channel: "stable"
docker_version: "latest"

docker_apt_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
docker_apt_gpg_key: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
docker_apt_repository: >-
  deb [arch={{ docker_apt_arch }} signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
  https://download.docker.com/linux/{{ ansible_distribution | lower }}
  {{ ansible_distribution_release | lower }} {{ docker_channel }}

docker_versioned_packages:
  - "docker-{{ docker_edition }}"
  - "docker-{{ docker_edition }}-cli"

docker_unversioned_packages:
  - "containerd.io"
  - "docker-buildx-plugin"
  - "docker-compose-plugin"

docker_dependencies:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

docker_python_packages:
  - python3-docker

docker_users: []
docker_service_enabled: true
docker_service_state: started

docker_daemon_config:
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  storage-driver: "overlay2"
  live-restore: true

docker_insecure_registries: []
docker_registry_mirrors: []

docker_remove_old_versions: true
docker_old_packages:
  - docker
  - docker-engine
  - docker.io
  - containerd
  - runc